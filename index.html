<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام بيور العلمي - المحرك الأصلي</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f1f5f9; }
        .invoice-card { transition: all 0.3s ease; border-right: 6px solid #e2e8f0; }
        .invoice-card.active { border-right-color: #10b981; background-color: #f0fdf4; }
        .no-print { display: block; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } body { background: white; padding: 0; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loader" class="hidden fixed inset-0 bg-slate-900/90 z-50 flex flex-col items-center justify-center text-white">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-indigo-500 mb-4"></div>
        <p class="font-bold">جاري تحليل البيانات...</p>
    </div>

    <div class="max-w-5xl mx-auto">
        <div class="no-print bg-slate-900 text-white p-6 rounded-3xl mb-8 flex justify-between items-center shadow-xl">
            <div>
                <h1 class="text-2xl font-black">بيور العلمي <span class="text-indigo-400 text-sm italic">Original Code</span></h1>
                <p class="text-xs opacity-60">نظام المطابقة الذكي للمكاتب العلمية</p>
            </div>
            <div class="flex gap-3">
                <button onclick="document.getElementById('fileInput').click()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-xl text-xs font-bold">رفع ملف (Excel/PDF)</button>
                <button onclick="document.getElementById('cameraInput').click()" class="bg-emerald-600 hover:bg-emerald-700 px-4 py-2 rounded-xl text-xs font-bold">تصوير وصل</button>
            </div>
            <input type="file" id="fileInput" class="hidden" accept=".xlsx, .xls, .pdf">
            <input type="file" id="cameraInput" class="hidden" accept="image/*">
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200" id="reportArea">
            <div class="flex justify-between items-start border-b-2 border-slate-100 pb-6 mb-8">
                <div>
                    <h2 class="text-2xl font-black text-slate-800">مكتب بيور العلمي</h2>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Scientific Bureau Statement</p>
                </div>
                <div class="text-left font-mono text-xs text-slate-500">
                    <p>DATE: <span id="currentDate">--/--/----</span></p>
                    <p>REF: PURE-2026-X</p>
                </div>
