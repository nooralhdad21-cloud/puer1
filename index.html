        const loader = document.getElementById('loaderOverlay');
        const loaderText = document.getElementById('loaderText');

        function showLoader(text) {
            loaderText.innerText = text || "جاري معالجة الملف...";
            loader.style.display = "flex";
        }
        function hideLoader() { loader.style.display = "none"; }

        document.getElementById('multiFile').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            showLoader(`جاري قراءة ملف: ${file.name}`);
            db = []; // تصفير القاعدة لضمان عدم تداخل الفواتير

            try {
                const ext = file.name.split('.').pop().toLowerCase();

                if (ext === 'xlsx' || ext === 'xls') {
                    await processExcel(file);
                } else if (ext === 'docx') {
                    await processWord(file);
                } else if (['png', 'jpg', 'jpeg'].includes(ext)) {
                    await processImage(file);
                } else {
                    alert("صيغة الملف غير مدعومة من هذا الزر.");
                }
            } catch (error) {
                console.error("خطأ أثناء المعالجة:", error);
                alert("حدث خطأ أثناء معالجة الملف.");
            } finally {
                hideLoader();
                renderList();
            }
        };

        async function processExcel(file) {
            const data = await file.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            
            json.forEach(row => {
                if (row.length >= 4) {
                    let dateStr = row.find(cell => typeof cell === 'string' && /\d{2}\/\d{2}\/\d{4}/.test(cell));
                    let nums = row.filter(cell => typeof cell === 'number' || (typeof cell === 'string' && /[\d,]+\.\d{2}/.test(cell)));
                    
                    if (dateStr && nums.length >= 2) {
                        let id = row[0] || "000"; 
                        db.push({ 
                            id: String(id), 
                            date: dateStr, 
                            total: String(nums[0]), 
                            paid: String(nums.length >= 3 ? nums[1] : "0.00"), 
                            remain: String(nums[nums.length - 1]), 
                            status: 'ok', 
                            note: '' 
                        });
                    }
                }
            });
        }

        async function processWord(file) {
            const arrayBuffer = await file.arrayBuffer();
            const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
            parseRawText(result.value);
        }

        async function processImage(file) {
            showLoader("جاري استخراج النصوص من الصورة (OCR)...");
            const worker = await Tesseract.createWorker('ara+eng');
            const { data: { text } } = await worker.recognize(file);
            await worker.terminate();
            parseRawText(text);
        }

        function parseRawText(text) {
            const lines = text.split('\n');
            lines.forEach(line => {
                if (/\d{2}\/\d{2}\/\d{4}/.test(line)) {
                    const dateMatch = line.match(/\d{2}\/\d{2}\/\d{4}/)[0];
                    const nums = line.match(/[\d,]+\.\d{2}|\d+(?:,\d{3})*(?:\.\d+)?/g) || [];
                    const cleanNums = nums.filter(n => n !== dateMatch && n.length > 3);

                    if (cleanNums.length >= 2) {
                        db.push({ 
                            id: Math.floor(10000 + Math.random() * 90000).toString(), 
                            date: dateMatch, 
                            total: cleanNums[0], 
                            paid: cleanNums.length >= 3 ? cleanNums[1] : "0.00", 
                            remain: cleanNums[cleanNums.length - 1], 
                            status: 'ok', 
                            note: 'مستخرج نصياً' 
                        });
                    }
                }
            });
        }
    </script>
