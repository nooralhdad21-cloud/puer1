<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>الزعيم اكسبرس للتوصيل السريع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات عامة للصفحة */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f4f6f9; /* لون خلفية مريح للعين */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        /* الحاوية الرئيسية للموقع */
        .tracking-container {
            background-color: #ffffff;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }

        /* مكان الشعار */
        .logo-area {
            margin-bottom: 25px;
        }

        .logo-area img {
            max-width: 150px;
            height: auto;
            /* إذا لم يكن لديك صورة الشعار حالياً، يمكنك ترك هذا فارغاً أو وضع صورة مؤقتة */
        }

        /* تنسيق النصوص */
        h1 {
            font-size: 26px;
            color: #1a1a1a;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            font-size: 16px;
            color: #666;
            margin-bottom: 35px;
            font-weight: 600;
        }

        /* صندوق البحث والأزرار */
        .search-box {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .search-box input {
            flex: 1;
            padding: 16px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        /* تأثير عند الضغط على مربع النص */
        .search-box input:focus {
            border-color: #d32f2f; /* لون أحمر مقارب للون الهوية البصرية */
            box-shadow: 0 0 8px rgba(211, 47, 47, 0.2);
        }

        .search-box button {
            padding: 16px 35px;
            font-size: 18px;
            background-color: #d32f2f; /* لون الزر الأحمر */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            transition: background-color 0.3s ease;
        }

        .search-box button:hover {
            background-color: #b71c1c; /* لون أغمق عند تمرير الماوس */
        }

        /* توافقية مع شاشات الهواتف */
        @media (max-width: 500px) {
            .search-box {
                flex-direction: column;
            }
            .search-box button {
                width: 100%;
            }
            .tracking-container {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="tracking-container">
        <div class="logo-area">
            <img src="https://via.placeholder.com/150x150?text=Logo" alt="شعار الزعيم اكسبرس" id="company-logo">
        </div>
        
        <h1>شركة الزعيم اكسبرس للتوصيل السريع</h1>
        <p>لتتبع الطرود و الشحنات و معرفة حالة الطلب</p>
        
        <div class="search-box">
            <input type="text" id="trackingInput" placeholder="ادخل رقم التتبع هنا...">
            <button onclick="searchParcel()">بحث</button>
        </div>
    </div>

    <script>
        function searchParcel() {
            // جلب القيمة التي أدخلها المستخدم
            const trackingNumber = document.getElementById('trackingInput').value;
            
            // التحقق مما إذا كان الحقل فارغاً
            if(trackingNumber.trim() === '') {
                alert('الرجاء إدخال رقم التتبع أولاً!');
            } else {
                // محاكاة عملية الاتصال بقاعدة البيانات
                alert('جاري البحث عن حالة الشحنة رقم: ' + trackingNumber + '\n\n(هنا سيتم ربط الكود بقاعدة البيانات لاحقاً لإظهار النتيجة الحقيقية)');
            }
        }
    </script>

</body>
</html>
